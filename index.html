<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Random 2-Digit Number Generator</title>
        <link rel="stylesheet" href="styles.css" />
        <script src="main.js" defer></script>
    </head>
    <body>
        <main class="card">
            <h1>Random 2-Digit Number Generator</h1>
            <p>Generate a number from 00 to 99.</p>
            <!--number display-->
            <div id="number-display" class="number">00</div>
            <p id="message">Ready?</p>
            <!--button to generate random number--><button
                id="generate-btn"
                type="button"
            >
                Generate
            </button>
        </main>
    </body>
</html>
