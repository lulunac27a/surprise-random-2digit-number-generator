<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Random 2-Digit Number Generator</title>
    <style>
      :root {
        color-scheme: dark;
      }

      body {
        margin: 0;
        font-family: Arial, Helvetica, sans-serif;
        background: linear-gradient(135deg, #1f1c2c, #928dab);
        color: #fff;
        min-height: 100vh;
        display: grid;
        place-items: center;
      }

      .card {
        background: rgba(0, 0, 0, 0.25);
        padding: 2rem;
        border-radius: 1.25rem;
        box-shadow: 0 15px 35px rgba(0, 0, 0, 0.25);
        text-align: center;
        width: min(90vw, 360px);
      }

      h1 {
        margin-top: 0;
        margin-bottom: 0.5rem;
        font-size: 1.5rem;
      }

      p {
        margin: 0.5rem 0;
      }

      .number {
        font-size: 4rem;
        font-weight: 700;
        letter-spacing: 0.2rem;
        margin: 1rem 0;
      }

      .number.surprise {
        color: #ffd54f;
        text-shadow: 0 0 12px rgba(255, 213, 79, 0.7);
      }

      button {
        margin-top: 1rem;
        border: none;
        border-radius: 999px;
        padding: 0.9rem 1.4rem;
        font-size: 1rem;
        cursor: pointer;
        background: #ff6f61;
        color: white;
        font-weight: 600;
      }

      button:hover {
        transform: translateY(-1px);
      }
    </style>
    <script src="main.js" defer></script>
  </head>
  <body>
    <main class="card">
      <h1>Random 2-Digit Number Generator</h1>
      <p>Generate a number from 00 to 99.</p>
      <div id="numberDisplay" class="number">00</div>
      <p id="message">Ready?</p>
      <button id="generateBtn" type="button">Generate</button>
    </main>
  </body>
</html>
